services:
  app:
    build:
      context: .
      dockerfile: ./Dockerfile
      target: main_app
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_USER: postgres
      API_HOST: image_service
    networks:
      - internal
    depends_on:
      - postgres
    volumes:
      - ./static/images:/pysite/static/images # bind mount docker compose down -v не удалит этот том
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: ./Dockerfile
      target: frontend
    ports:
      - "3000:3000"
    networks:
      - internal
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      NODE_ENV: production
    depends_on:
      - app
    restart: unless-stopped

  migrate:
    profiles: ["tools"]
    build:
      context: .
      dockerfile: ./Dockerfile
      target: migrate
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_USER: postgres
    networks:
      - internal
    depends_on:
      - postgres
    restart: "no"

  runner:
    profiles: ["tools"]
    build:
      context: .
      dockerfile: ./Dockerfile
      target: runner
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_USER: postgres
    networks:
      - internal
    depends_on:
      - postgres
    restart: "no"

  postgres:
    image: postgres:16-alpine
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    networks:
      - internal
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - app
    volumes:
      - ./nginx/site.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/snippets:/etc/nginx/snippets:ro
      - ./static:/var/www/static:ro
    restart: unless-stopped

    networks:
      - internal



networks:
  internal:
    driver: bridge

volumes:
  pgdata: