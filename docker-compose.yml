services:
  api:
    build:
      context: .
      dockerfile: ./Dockerfile
      target: main
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_USER: postgres
      IS_TEST: True
      REDIS_HOST: redis
      IMAGE_SERVICE_HOST: image_service
    networks:
      - internal
    depends_on:
      - postgres
      - redis
      - image_service
    volumes:
      - ./media:/app/media # bind mount docker compose down -v не удалит этот том
    restart: unless-stopped

  image_service:
    build:
      context: .
      dockerfile: ./Dockerfile
      target: image
    env_file:
      - .env
    environment:
      PORT: ${IMAGE_SERVICE_PORT}
    networks:
      - internal
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: ./Dockerfile
      target: frontend
    networks:
      - internal
    restart: unless-stopped

  migrate:
    profiles: ["tools"]
    build:
      context: .
      dockerfile: ./Dockerfile
      target: migrate
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_USER: postgres
    networks:
      - internal
    depends_on:
      - postgres
    restart: "no"

#  scripts:
#    profiles: ["tools"]
#    build:
#      context: .
#      dockerfile: ./Dockerfile
#      target: scripts
#    env_file:
#      - .env
#    environment:
#      DB_HOST: postgres
#      DB_USER: postgres
#    networks:
#      - internal
#    depends_on:
#      - postgres
#    restart: "no"
#    stdin_open: true # Эквивалент флага -i в docker run
#    tty: true        # Эквивалент флага -t в docker run

  scripts:
    profiles: ["tools"]
    build:
      context: .
      dockerfile: ./Dockerfile
      target: scripts
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_USER: postgres
      IMAGE_SERVICE_HOST: image_service
    networks:
      - internal
    depends_on:
      - postgres
      - image_service
    volumes:
      - ./scripts/seed_categories:/app/scripts/seed_categories
      - ./scripts/seed_products:/app/scripts/seed_products
      - ./scripts/categories_images:/app/scripts/categories_images
      - ./scripts/products_images:/app/scripts/products_images
      - ./media:/app/media
    restart: "no"
    stdin_open: true # Эквивалент флага -i в docker run
    tty: true        # Эквивалент флага -t в docker run

  postgres:
    image: postgres:16-alpine
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    networks:
      - internal
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  nginx:
    build:
      context: .
      dockerfile: ./Dockerfile
      target: frontend
    depends_on:
      - api
    volumes:
      # Монтируем ТОЛЬКО конфиги и медиа. Фронтенд уже внутри
      - ./nginx/site.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/snippets:/etc/nginx/snippets:ro
      - ./media:/var/www/media:ro
    restart: unless-stopped
    networks:
      - internal
    ports:
      - "80:80"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - internal

  worker:
    build:
      context: .
      dockerfile: ./Dockerfile
      target: worker
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_USER: postgres
      REDIS_HOST: redis
    networks:
      - internal
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  scheduler:
    build:
      context: .
      dockerfile: ./Dockerfile
      target: scheduler
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_USER: postgres
      REDIS_HOST: redis
    networks:
      - internal
    depends_on:
      - postgres
      - redis
      - worker
    restart: unless-stopped


networks:
  internal:
    driver: bridge

volumes:
  pgdata: